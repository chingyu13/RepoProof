<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoProof — Link the Project</title>
<link href="/static/vendor/oxanium.css" rel="stylesheet"><!-- local (offline) fonts, if vendored -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFFFF;
  --card:#F4F4F4;
  --border:#888;
  --ink:#0C1421;
  --mute:#7D7D7D;
  --input-bg:#fff;
  --input-border:#7D7D7D;
  --btn:#626262;
  --btn-text:#fff;
  --demo-bg:#FEFEFE;
  --toggle-bg:#D9D9D9;
  --danger:#C0392B;
}
html.dark{
  --bg:#1A1A1A;
  --card:#2A2A2A;
  --border:#777;
  --ink:#F2F2F2;
  --mute:#A0A0A0;
  --input-bg:#1F1F1F;
  --input-border:#555;
  --btn:#D0D0D0;
  --btn-text:#111;
  --demo-bg:#333;
  --toggle-bg:#3A3B40;
  --danger:#FF7B72;
}
*{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%}
body{
  min-height:100vh;
  min-height:100dvh;
  font-family:'Oxanium',sans-serif;
  background:var(--bg);
  color:var(--ink);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  transition:background .2s ease,color .2s ease;
}
.theme-toggle{
  position:fixed;top:18px;right:18px;z-index:10;
  display:flex;gap:8px;padding:5px;
  background:transparent;border:1px solid var(--border);border-radius:5px;
}
.theme-toggle button{
  width:24px;height:24px;border:none;border-radius:3px;
  display:grid;place-items:center;
  background:transparent;cursor:pointer;line-height:1;
  color:var(--mute);
}
.theme-toggle button.active{background:var(--toggle-bg);color:var(--ink)}
.theme-icon{width:20px;height:20px;display:block}
.theme-icon *{stroke:currentColor}

.card{
  display:flex;
  padding:36px 26px;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
  align-self:center;
  width:min(506px,100%);
  min-height:290px;
  border-radius:10px;
  border:3px solid var(--border);
  background:var(--card);
  box-shadow:0 12px 32px 0 rgba(12,20,33,.07);
}

.brand{
  font-size:28px;font-weight:600;letter-spacing:-.03em;line-height:1;
  color:var(--ink);
}
.lead{
  font-size:12px;font-weight:400;color:var(--mute);
  text-align:center;line-height:1.45;max-width:28em;
}

.row{
  display:flex;align-items:stretch;gap:8px;width:min(250px,100%);
}
.row input{
  flex:1;min-width:0;
  font-family:inherit;font-size:12px;font-weight:400;
  padding:6px 8px;
  border:2px solid var(--input-border);
  border-radius:5px;
  background:var(--input-bg);color:var(--ink);
  outline:none;
}
.row input:focus{border-color:var(--border)}
.row input::placeholder{color:var(--mute)}
.row .enter{
  font-family:inherit;font-size:12px;font-weight:500;
  padding:6px 14px;border:none;border-radius:5px;
  background:var(--btn);color:var(--btn-text);cursor:pointer;
  white-space:nowrap;
}
.row .enter:hover{filter:brightness(1.08)}
.row .enter:active{transform:translateY(1px)}

.demo-btn{
  width:min(250px,100%);
  font-family:inherit;font-size:12px;font-weight:500;
  padding:7px 12px;
  border-radius:5px;
  border:2px solid var(--input-border);
  background:var(--demo-bg);color:var(--ink);
  cursor:pointer;
}
.demo-btn:hover{border-color:var(--border)}

.err{
  font-size:12px;font-weight:500;color:var(--danger);
  min-height:1.2em;text-align:center;
}
.err:empty{display:none}
@media (max-width:560px){
  body{padding:16px}
  .card{width:100%;padding:36px 26px}
  .theme-toggle{top:10px;right:10px}
}
</style>
</head>
<body>
  <div class="theme-toggle" role="group" aria-label="Theme">
    <button type="button" id="theme-light" class="active" title="Light" aria-label="Light theme">
      <svg class="theme-icon" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <circle cx="13" cy="13" r="5.2" stroke-width="1.4"/>
        <path d="M13 3.4v3M13 19.6v3M3.4 13h3M19.6 13h3M6.2 6.2l2.1 2.1M17.7 17.7l2.1 2.1M19.8 6.2l-2.1 2.1M8.3 17.7l-2.1 2.1" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
    <button type="button" id="theme-dark" title="Dark" aria-label="Dark theme">
      <svg class="theme-icon" viewBox="0 0 26 26" fill="none" aria-hidden="true">
        <path d="M17.9 17.2a7.6 7.6 0 0 1-8.8-8.8 7.7 7.7 0 1 0 8.8 8.8Z" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="17.7" cy="8" r=".9" fill="currentColor" stroke="none"/>
        <circle cx="20.2" cy="11.2" r=".65" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>

  <main class="card" aria-label="Link the Project">
    <div class="brand">RepoProof</div>
    <p class="lead">To use the project linker, please enter the password.</p>
    <form class="row" id="passform" autocomplete="off">
      <input type="password" id="password" name="password" placeholder="Enter the Password" required>
      <button type="submit" class="enter">Enter</button>
    </form>
    <div class="err" id="err"></div>
    <button type="button" class="demo-btn" id="demo">I just want to see the demo</button>
  </main>

<script>
(function () {
  const err = document.getElementById("err");
  const form = document.getElementById("passform");
  const input = document.getElementById("password");
  const enter = form.querySelector(".enter");

  function setTheme(mode) {
    document.documentElement.classList.toggle("dark", mode === "dark");
    document.getElementById("theme-light").classList.toggle("active", mode === "light");
    document.getElementById("theme-dark").classList.toggle("active", mode === "dark");
    localStorage.setItem("repoproof-theme", mode);
  }
  setTheme(localStorage.getItem("repoproof-theme") || "light");
  document.getElementById("theme-light").onclick = () => setTheme("light");
  document.getElementById("theme-dark").onclick = () => setTheme("dark");

  if (new URLSearchParams(location.search).get("login") === "required") {
    err.textContent = "Enter the creator password to continue.";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.textContent = "";
    enter.disabled = true;
    enter.textContent = "Checking…";
    try {
      const response = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password: input.value})
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.detail || "Could not sign in.");
      location.href = "/creator";
    } catch (error) {
      err.textContent = error.message;
      input.select();
      enter.disabled = false;
      enter.textContent = "Enter";
    }
  });

  document.getElementById("demo").onclick = () => {
    location.href = "demo";
  };
})();
</script>
</body>
</html>
