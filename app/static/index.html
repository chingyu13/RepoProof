<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoProof — Link the Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E8E8E8;
  --card:#F4F4F4;
  --border:#888;
  --ink:#111;
  --mute:#6B6B6B;
  --input-bg:#fff;
  --input-border:#C8C8C8;
  --btn:#4A4A4A;
  --btn-text:#fff;
  --demo-bg:#EFEFEF;
  --danger:#C0392B;
}
html.dark{
  --bg:#1A1A1A;
  --card:#2A2A2A;
  --border:#777;
  --ink:#F2F2F2;
  --mute:#A0A0A0;
  --input-bg:#1F1F1F;
  --input-border:#555;
  --btn:#D0D0D0;
  --btn-text:#111;
  --demo-bg:#333;
  --danger:#FF7B72;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--ink);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  transition:background .2s ease,color .2s ease;
}
.theme-toggle{
  position:fixed;top:18px;right:18px;z-index:10;
  display:flex;gap:4px;padding:4px;
  background:var(--card);border:2px solid var(--border);border-radius:999px;
}
.theme-toggle button{
  width:36px;height:36px;border:none;border-radius:999px;
  background:transparent;cursor:pointer;font-size:16px;line-height:1;
  color:var(--mute);
}
.theme-toggle button.active{background:var(--btn);color:var(--btn-text)}

.card{
  display:flex;
  padding:36px 26px;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
  align-self:stretch;
  width:min(420px,100%);
  border-radius:10px;
  border:3px solid var(--border);
  background:var(--card);
  box-shadow:0 12px 32px 0 rgba(12,20,33,.07);
}

.brand{
  font-size:42px;font-weight:800;letter-spacing:-.03em;line-height:1;
  color:var(--ink);
}
.lead{
  font-size:15px;font-weight:500;color:var(--mute);
  text-align:center;line-height:1.45;max-width:28em;
}

.row{
  display:flex;align-items:stretch;gap:10px;width:100%;
}
.row input{
  flex:1;min-width:0;
  font-family:inherit;font-size:15px;font-weight:500;
  padding:12px 14px;
  border:1.5px solid var(--input-border);
  border-radius:8px;
  background:var(--input-bg);color:var(--ink);
  outline:none;
}
.row input:focus{border-color:var(--border)}
.row input::placeholder{color:var(--mute)}
.row .enter{
  font-family:inherit;font-size:15px;font-weight:700;
  padding:12px 18px;border:none;border-radius:8px;
  background:var(--btn);color:var(--btn-text);cursor:pointer;
  white-space:nowrap;
}
.row .enter:hover{filter:brightness(1.08)}
.row .enter:active{transform:translateY(1px)}

.demo-btn{
  width:100%;
  font-family:inherit;font-size:15px;font-weight:600;
  padding:13px 16px;
  border-radius:8px;
  border:1.5px solid var(--input-border);
  background:var(--demo-bg);color:var(--ink);
  cursor:pointer;
}
.demo-btn:hover{border-color:var(--border)}

.err{
  font-size:13px;font-weight:600;color:var(--danger);
  min-height:1.2em;text-align:center;
}
.err:empty{display:none}
</style>
</head>
<body>
  <div class="theme-toggle" role="group" aria-label="Theme">
    <button type="button" id="theme-light" class="active" title="Light">☀</button>
    <button type="button" id="theme-dark" title="Dark">☾</button>
  </div>

  <main class="card" aria-label="Link the Project">
    <div class="brand">RepoProof</div>
    <p class="lead">To use the project linker, please enter the password.</p>
    <form class="row" id="passform" autocomplete="off">
      <input type="password" id="password" name="password" placeholder="Enter the Password" required>
      <button type="submit" class="enter">Enter</button>
    </form>
    <div class="err" id="err"></div>
    <button type="button" class="demo-btn" id="demo">I just want to see the demo</button>
  </main>

<script>
(function () {
  const err = document.getElementById("err");
  const form = document.getElementById("passform");
  const input = document.getElementById("password");
  const enter = form.querySelector(".enter");

  function setTheme(mode) {
    document.documentElement.classList.toggle("dark", mode === "dark");
    document.getElementById("theme-light").classList.toggle("active", mode === "light");
    document.getElementById("theme-dark").classList.toggle("active", mode === "dark");
    localStorage.setItem("repoproof-theme", mode);
  }
  setTheme(localStorage.getItem("repoproof-theme") || "light");
  document.getElementById("theme-light").onclick = () => setTheme("light");
  document.getElementById("theme-dark").onclick = () => setTheme("dark");

  if (new URLSearchParams(location.search).get("login") === "required") {
    err.textContent = "Enter the creator password to continue.";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.textContent = "";
    enter.disabled = true;
    enter.textContent = "Checking…";
    try {
      const response = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password: input.value})
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(body.detail || "Could not sign in.");
      location.href = "/creator";
    } catch (error) {
      err.textContent = error.message;
      input.select();
      enter.disabled = false;
      enter.textContent = "Enter";
    }
  });

  document.getElementById("demo").onclick = () => {
    location.href = "/demo";
  };
})();
</script>
</body>
</html>
