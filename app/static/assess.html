<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RepoProof — Assessment</title>
<style>
/* Theme tokens from Figma: File Uploader — Light & Dark Mode (Community) */
:root{
  --bg:#f1f4ff; --card:#ffffff; --ink:#0c1421; --muted:#7d7d7d;
  --line:#d8daeb; --input-bg:#fefefe; --placeholder:#949fb1;
  --accent:#5046fa; --accent-hover:#4238e0; --ok:#06bf5c; --bad:#df3d43;
  --shadow:0 12px 32px rgba(12,20,33,.07);
}
[data-theme="dark"]{
  --bg:#161618; --card:#1e1f22; --ink:#f5f6f8; --muted:#9a9aa3;
  --line:#33343a; --input-bg:#232428; --placeholder:#6f7078;
  --accent:#5046fa; --accent-hover:#6157ff; --ok:#06bf5c; --bad:#f2555a;
  --shadow:0 12px 32px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
body{font-family:Inter,-apple-system,"Segoe UI",Roboto,sans-serif;margin:0;background:var(--bg);color:var(--ink)}
main{max-width:760px;margin:2rem auto;padding:0 1rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.3rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
h1{font-size:1.3rem;font-weight:600}
.q{margin:1.2rem 0;padding-top:.8rem;border-top:1px solid var(--line)}
.opt{display:flex;gap:.6rem;align-items:flex-start;margin:.35rem 0;padding:.5rem .6rem;border-radius:10px;border:1px solid transparent}
.opt:hover{background:var(--bg);border-color:var(--line)}
.small{font-size:.82rem;color:var(--muted)}
button{background:var(--accent);color:#fff;border:0;border-radius:10px;padding:.65rem 1.2rem;font:inherit;font-weight:500;letter-spacing:.03em;cursor:pointer}
button:hover{background:var(--accent-hover)}
button:disabled{opacity:.5;cursor:default}
#themeToggle{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:5px;float:right;display:flex;gap:8px;padding:5px}
#themeToggle .seg{width:24px;height:24px;border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--muted);background:transparent}
#themeToggle .seg.active{background:var(--chip);color:var(--ink)}
#themeToggle .theme-icon{width:20px;height:20px;display:block}
#themeToggle .theme-icon *{stroke:currentColor}
input[type=text]{padding:.55rem .7rem;border:1px solid var(--line);border-radius:10px;font:inherit;width:100%;background:var(--input-bg);color:var(--ink)}
input::placeholder{color:var(--placeholder)}
.correct{color:var(--ok)} .wrong{color:var(--bad)}
.result-q{border-left:3px solid var(--line);padding-left:.8rem;margin:.8rem 0}
.result-q.ok{border-color:var(--ok)} .result-q.bad{border-color:var(--bad)}
.err{color:var(--bad)}
</style>
</head>
<body>
<main>
  <div class="card" id="intro">
    <button id="themeToggle" title="Toggle light/dark" aria-label="Toggle light/dark">
      <span class="seg" id="segSun">
        <svg class="theme-icon" viewBox="0 0 26 26" fill="none" aria-hidden="true">
          <circle cx="13" cy="13" r="5.2" stroke-width="1.4"/>
          <path d="M13 3.4v3M13 19.6v3M3.4 13h3M19.6 13h3M6.2 6.2l2.1 2.1M17.7 17.7l2.1 2.1M19.8 6.2l-2.1 2.1M8.3 17.7l-2.1 2.1" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="seg" id="segMoon">
        <svg class="theme-icon" viewBox="0 0 26 26" fill="none" aria-hidden="true">
          <path d="M17.9 17.2a7.6 7.6 0 0 1-8.8-8.8 7.7 7.7 0 1 0 8.8 8.8Z" stroke-width="1.4" stroke-linejoin="round"/>
          <circle cx="17.7" cy="8" r=".9" fill="currentColor" stroke="none"/>
          <circle cx="20.2" cy="11.2" r=".65" fill="currentColor" stroke="none"/>
        </svg>
      </span>
    </button>
    <h1 id="title">Loading…</h1>
    <p class="small" id="scoring"></p>
    <label class="small">Your name (optional)</label>
    <input type="text" id="taker">
  </div>
  <div class="card" id="paper"></div>
  <div class="card"><button id="submit">Submit answers</button> <span class="err" id="err"></span></div>
  <div class="card" id="report" style="display:none"></div>
</main>
<script>
const $ = id => document.getElementById(id);
const token = location.pathname.split('/').pop();
let data = null;

const savedTheme = localStorage.getItem('rp-theme');
if (savedTheme) document.documentElement.dataset.theme = savedTheme;
else if (matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
function syncThemeBtn(){
  const dark = document.documentElement.dataset.theme === 'dark';
  $('segSun').classList.toggle('active', !dark);
  $('segMoon').classList.toggle('active', dark);
}
$('themeToggle').onclick = ()=>{
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('rp-theme', next);
  syncThemeBtn();
};
syncThemeBtn();

async function api(path, opts={}) {
  const r = await fetch(path, opts);
  const body = await r.json().catch(()=>({detail:r.statusText}));
  if (!r.ok) throw new Error(body.detail || JSON.stringify(body));
  return body;
}
function esc(s){ return (s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

/* --- adaptive state: answers accumulate locally, order is what the server
       uses to judge the previous answer and pick the next difficulty --- */
let adaptive = false;
const accResponses = {};
const accOrder = [];

function renderQuestionBlock(q, label){
  const d = document.createElement('div');
  d.className = 'q';
  const hint = q.correct_count ? ` <span class="small">(${q.correct_count} correct)</span>` : '';
  // pre-wrap: stems may embed quoted code blocks with meaningful line breaks
  d.innerHTML = `<p style="white-space:pre-wrap"><strong>${label}.</strong> ${esc(q.stem)}${hint}</p>`;
  q.options.forEach(o=>{
    const l = document.createElement('label');
    l.className = 'opt';
    l.innerHTML = `<input type="checkbox" data-q="${q.id}" value="${o.key}"> <span><strong>${o.key}.</strong> ${esc(o.text)}</span>`;
    d.appendChild(l);
  });
  return d;
}

async function load(){
  try { data = await api('/api/take/'+token); }
  catch(e){ $('title').textContent = 'Not found'; $('err').textContent = e.message; return; }
  $('title').textContent = data.title;
  $('scoring').textContent = data.scoring;
  adaptive = !!data.adaptive;
  if (adaptive){
    $('scoring').textContent += ' Question order adapts to your answers.';
    $('submit').parentElement.style.display = 'none';   // auto-submits at the end
    await nextAdaptive();
    return;
  }
  const paper = $('paper');
  data.questions.forEach((q,i)=> paper.appendChild(renderQuestionBlock(q, 'Q'+(i+1))));
}

async function nextAdaptive(){
  const r = await api('/api/take/'+token+'/next', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({responses: accResponses, order: accOrder})});
  const paper = $('paper');
  paper.innerHTML = '';
  if (r.done){
    paper.innerHTML = '<p class="small">All questions answered — submitting…</p>';
    await doSubmit(accResponses);
    return;
  }
  const q = r.question;
  paper.appendChild(renderQuestionBlock(q, `Question ${r.answered+1} / ${r.total}`));
  const btn = document.createElement('button');
  btn.textContent = (r.answered + 1 === r.total) ? 'Finish' : 'Next question';
  btn.onclick = async ()=>{
    accResponses[q.id] = [...paper.querySelectorAll('input[type=checkbox]:checked')].map(c=>c.value);
    accOrder.push(q.id);
    btn.disabled = true;
    try { await nextAdaptive(); }
    catch(e){ $('err').textContent = e.message; btn.disabled = false; }
  };
  paper.appendChild(btn);
}

async function doSubmit(responses){
  try {
    const score = await api('/api/take/'+token+'/submit', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({taker_name:$('taker').value, responses})});
    showReport(score);
  } catch(e){ $('err').textContent = e.message; }
}

$('submit').onclick = async ()=>{
  $('err').textContent = '';
  const responses = {};
  data.questions.forEach(q=>{ responses[q.id] = []; });
  document.querySelectorAll('#paper input[type=checkbox]:checked').forEach(c=>{
    responses[c.dataset.q].push(c.value);
  });
  await doSubmit(responses);
};

function showReport(s){
  $('submit').disabled = true;
  const r = $('report');
  r.style.display = 'block';
  let html = `<h1>Result: ${s.correct}/${s.total} (${s.percent}%)</h1>`;
  // Understanding Profile: per-strategy (or per-topic) bars, e.g. Explain 92% / Debugging 45%
  html += '<h3>Understanding profile</h3>' + Object.entries(s.per_focus).map(([k,v])=>{
    const pct = v.total ? Math.round(100*v.correct/v.total) : 0;
    return `<div style="display:flex;align-items:center;gap:.6rem;margin:.25rem 0">
      <span style="flex:0 0 9em">${esc(k)}</span>
      <span style="flex:1;height:10px;background:var(--line);border-radius:5px;overflow:hidden">
        <span style="display:block;height:100%;width:${pct}%;background:${pct>=60?'var(--ok)':pct>=40?'#d9a514':'var(--bad)'}"></span>
      </span>
      <span class="small" style="flex:0 0 6em">${pct}% (${v.correct}/${v.total})</span>
    </div>`;
  }).join('') + '<h3>Per question</h3>';
  s.per_question.forEach((pq,i)=>{
    html += `<div class="result-q ${pq.correct?'ok':'bad'}">
      <p><strong>Q${i+1}</strong> — <span class="${pq.correct?'correct':'wrong'}">${pq.correct?'correct':'incorrect'}</span>.
      You selected [${pq.selected.join(', ')||'nothing'}]; the answer is [${pq.answer.join(', ')}].</p>
      ${pq.explanation?`<p class="small">${esc(pq.explanation)}</p>`:''}</div>`;
  });
  r.innerHTML = html;
  r.scrollIntoView({behavior:'smooth'});
}

load();
</script>
</body>
</html>
